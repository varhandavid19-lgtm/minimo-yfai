<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nastavení · minimo · YFAI</title>
<link rel="stylesheet" href="header.css">
<style>
  :root{
    --navy-1:#0f2f5f; --navy-2:#1b4b8f; --panel:#1e4c8a;
    --bg:#f4f6f9; --card:#fff; --line:#dde4ec; --text:#16233a; --muted:#6b7a90;
    --red:#c0392b; --radius:8px; font-synthesis-weight:none;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:13px}
  button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--radius);border:1px solid transparent;padding:8px 13px}
  select,input{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;color:var(--text)}
  a{color:#2563a8}

  header{background:linear-gradient(90deg,var(--navy-1),var(--navy-2));color:#fff;padding:13px 20px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.3px;line-height:1.1}
  header .sub{font-size:11.5px;opacity:.75;margin-top:2px}
  .brand{background:#fff;border-radius:8px;padding:8px 13px;display:flex;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.22);flex:none}
  .brand svg{display:block;height:48px;width:auto}
  .chips{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:4px 11px;font-size:11px;white-space:nowrap}
  .btn-logout{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;font-size:11px;padding:5px 13px;text-decoration:none}
  @media(max-width:640px){header h1{font-size:18px}.brand svg{height:40px}}

  main{padding:22px 20px 46px;max-width:1000px;margin:0 auto}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(15,47,95,.05);margin-bottom:16px}
  .panel > h2{background:var(--panel);color:#fff;margin:0;font-size:13px;font-weight:700;padding:10px 14px;display:flex;align-items:center;gap:9px}
  .panel > h2 .right{margin-left:auto;font-weight:500;font-size:11px;opacity:.85}
  .panel .body{padding:14px}

  .legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}
  .lvl{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:#fafbfd}
  .lvl .b{margin-top:1px}
  .lvl .t b{font-size:12.5px}
  .lvl .t div{font-size:11.5px;color:var(--muted);line-height:1.45}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;white-space:nowrap}

  .tblwrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:#16355f;color:#fff;text-align:left;padding:9px 11px;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
  tbody td{padding:8px 11px;border-bottom:1px solid #eef1f5;vertical-align:middle}
  tbody tr:hover td{background:#f7f9fc}
  td.nm{font-weight:600;white-space:nowrap}
  td.uid{font-size:10.5px;color:var(--muted);font-family:ui-monospace,Menlo,Consolas,monospace}
  .me-tag{font-size:10px;color:#2563a8;font-weight:700;margin-left:6px}

  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
    background:linear-gradient(160deg,#0f2f5f,#2a5ea3)}
  .card{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:26px;text-align:center;box-shadow:0 22px 55px rgba(0,0,0,.35)}
  .card .brand{margin:0 auto 16px;box-shadow:none;border:1px solid var(--line);width:max-content}
  .card h2{margin:0 0 6px;font-size:18px}
  .card p{margin:0 0 16px;font-size:13px;color:var(--muted);line-height:1.6}
  .card a.btn{display:inline-block;background:var(--navy-2);color:#fff;text-decoration:none;padding:9px 16px;border-radius:8px;font-weight:700;font-size:13px}
  .toast{position:fixed;right:16px;bottom:16px;z-index:90;background:#1f9254;color:#fff;border-radius:10px;padding:11px 15px;font-size:12.5px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
  .toast.err{background:var(--red)}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="card"><h2>Načítám…</h2><p>Připojuji se k Firebase.</p></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, updateDoc }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDi3OVq2Al0WXFPgqhMAN9lPGuExOU80Cc",
  authDomain: "nakupni-pozadavky.firebaseapp.com",
  projectId: "nakupni-pozadavky",
  storageBucket: "nakupni-pozadavky.firebasestorage.app",
  messagingSenderId: "214674774365",
  appId: "1:214674774365:web:7f7b51c8169b75f8acb0b4",
  measurementId: "G-BGDMXEWBQH"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

function logoSvg(){
  return `<svg viewBox="0 0 300 138" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YFAI minimo">
    <defs><pattern id="yfai-stripes" patternUnits="userSpaceOnUse" x="0" y="8" width="10" height="9.8">
      <rect x="0" y="0" width="10" height="5.9" fill="#1f66b5"/></pattern></defs>
    <text x="150" y="86" text-anchor="middle" fill="url(#yfai-stripes)" font-family="'Arial Black',Arial,sans-serif"
      font-weight="900" font-size="108" textLength="244" lengthAdjust="spacingAndGlyphs">YFAI</text>
    <text x="150" y="128" text-anchor="middle" fill="#111418" font-family="Arial,Helvetica,sans-serif"
      font-weight="700" font-size="42" letter-spacing="1" textLength="246" lengthAdjust="spacingAndGlyphs">minimo</text>
  </svg>`;
}

/* ===== Společné levely (stejné pro všechny moduly) ===== */
const LEVELS = [
  {key:'basic',      label:'Basic',           rank:1, color:'#6b7a90', desc:'Vidí a zakládá svoje (požadavek, žádost o dovolenou). Needituje cizí.'},
  {key:'warehouse',  label:'Warehouse',       rank:2, color:'#2563a8', desc:'+ mění stavy a údaje ve skladových věcech.'},
  {key:'approver',   label:'Approver',        rank:3, color:'#b7791f', desc:'+ schvaluje a zamítá.'},
  {key:'wadmin',     label:'Warehouse Admin', rank:4, color:'#6b46c1', desc:'+ spravuje číselníky a nastavení modulů.'},
  {key:'superadmin', label:'Super Admin',     rank:5, color:'#1f9254', desc:'Vše + správa uživatelů a levelů.'},
];
const LEVEL_BY = Object.fromEntries(LEVELS.map(l=>[l.key,l]));
/* Můstek na staré role nákupní appky (aby nákupy jely dál). */
const ROLE2LEVEL = {zadavatel:'basic', skladnik:'warehouse', schvalovatel:'approver', admin:'superadmin'};
const LEVEL2ROLE = {basic:'zadavatel', warehouse:'skladnik', approver:'schvalovatel', wadmin:'admin', superadmin:'admin'};
const levelOf = d => (d && d.level && LEVEL_BY[d.level]) ? d.level : ((d && ROLE2LEVEL[d.role]) || 'basic');

const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const badge = key => { const l=LEVEL_BY[key]||LEVEL_BY.basic; return `<span class="badge" style="background:${l.color}">${esc(l.label)}</span>`; };

let me=null, myLevel='basic', users=[], ready=false, unsub=null, toastMsg=null, toastKind='';
const appEl=document.getElementById('app');

onAuthStateChanged(auth, async (user)=>{
  if(!user){ location.href='index.html'; return; }         // nepřihlášen → na portál (kde je login)
  me={uid:user.uid, email:user.email};
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    myLevel=levelOf(snap.exists()?snap.data():null);
  }catch(e){ myLevel='basic'; }
  if(myLevel==='superadmin'){ subscribe(); }
  ready=true; render();
});

function subscribe(){
  unsub = onSnapshot(collection(db,'users'), s=>{
    users = s.docs.map(d=>({uid:d.id, ...d.data()}))
      .sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'cs'));
    render();
  }, e=>toast('Chyba načítání uživatelů: '+e.message,'err'));
}

async function setLevel(uid, level){
  try{
    await updateDoc(doc(db,'users',uid), {level, role: LEVEL2ROLE[level]});
    toast('Level uložen.','ok');
  }catch(e){ toast('Nepodařilo se uložit: '+e.message,'err'); }
}

function render(){
  if(!ready){ return; }
  if(myLevel!=='superadmin'){ appEl.innerHTML=denyView(); return; }
  appEl.innerHTML = view(); wire(); renderToast();
}

function denyView(){
  return `<div class="center"><div class="card">
    <div class="brand">${logoSvg()}</div>
    <h2>Nemáš oprávnění</h2>
    <p>Správa uživatelů a levelů je jen pro <b>Super Admina</b>.<br>Přihlášen jako ${esc(me?.email||'')} (${LEVEL_BY[myLevel].label}).</p>
    <a class="btn" href="index.html">← Zpět na portál</a>
  </div></div>`;
}

function view(){
  const rows = users.length ? users.map(u=>{
    const lvl=levelOf(u);
    const opts=LEVELS.map(l=>`<option value="${l.key}" ${lvl===l.key?'selected':''}>${esc(l.label)}</option>`).join('');
    const meMark = u.uid===me.uid ? '<span class="me-tag">(vy)</span>' : '';
    return `<tr>
      <td class="nm">${esc(u.name||'—')}${meMark}</td>
      <td>${esc(u.team||'—')}</td>
      <td>${badge(lvl)}</td>
      <td><select data-uid="${u.uid}">${opts}</select></td>
      <td class="uid">${esc(u.uid)}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:22px">Zatím žádní uživatelé. Objeví se tu každý, kdo se přihlásí do portálu.</td></tr>`;

  const legend = LEVELS.map(l=>`<div class="lvl">
    <span class="b">${badge(l.key)}</span>
    <div class="t"><div>${esc(l.desc)}</div></div>
  </div>`).join('');

  const uh = window.uheaderHTML ? window.uheaderHTML({module:'Nastavení',cur:'nastaveni',user:esc(me.email),level:'Super Admin',logoutAttr:'id="btn-logout"'}) : '';
  return `${uh}
  <main>
    <div class="panel"><h2>👥 Uživatelé <span class="right">${users.length} účtů</span></h2><div class="body">
      <div class="tblwrap"><table>
        <thead><tr><th>Jméno</th><th>Úsek / tým</th><th>Aktuální level</th><th>Změnit level</th><th>Účet (uid)</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div></div>

    <div class="panel"><h2>ℹ️ Co který level znamená</h2><div class="body">
      <div class="legend">${legend}</div>
      <p style="margin:12px 0 0;font-size:11.5px;color:var(--muted)">
        Level platí napříč moduly; co přesně smí v konkrétním modulu, ladíme modul po modulu.
        Změna se ukládá okamžitě a projeví se po dalším přihlášení daného člověka.
      </p>
    </div></div>
  </main>`;
}

function wire(){
  document.getElementById('btn-logout')?.addEventListener('click',()=>signOut(auth));
  document.querySelectorAll('select[data-uid]').forEach(sel=>
    sel.addEventListener('change',()=>setLevel(sel.getAttribute('data-uid'), sel.value)));
}

function toast(m,k=''){ toastMsg=m; toastKind=k; renderToast(); clearTimeout(toast._t); toast._t=setTimeout(()=>{toastMsg=null;renderToast();},3000); }
function renderToast(){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  if(!toastMsg) return;
  const el=document.createElement('div'); el.className='toast '+toastKind; el.textContent=toastMsg; document.body.appendChild(el);
}
</script>
<script src="header.js"></script>
</body>
</html>
