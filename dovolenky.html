<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plánování směn a přítomnosti — YFAI</title>
<link rel="stylesheet" href="header.css">
<style>
  :root{
    --navy-1:#0f2f5f; --navy-2:#1b4b8f; --panel:#1e4c8a;
    --bg:#f4f6f9; --card:#ffffff; --line:#dde4ec; --text:#16233a; --muted:#6b7a90;
    --green:#1f9254; --red:#c0392b; --amber:#b7791f; --blue:#2563a8;
    --radius:8px; font-synthesis-weight:none;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:13px}
  button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--radius);border:1px solid transparent;padding:8px 13px}
  button:disabled{opacity:.45;cursor:not-allowed}
  input,select,textarea{font-family:inherit;font-size:13.5px;padding:8px 10px;border:1px solid var(--line);
    border-radius:var(--radius);background:#fff;color:var(--text);width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid #2a5ea3;outline-offset:0;border-color:#2a5ea3}
  a{color:#2563a8}

  /* ---- hlavička ---- */
  header{background:linear-gradient(90deg,var(--navy-1),var(--navy-2));color:#fff;padding:12px 18px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:24px;margin:0;font-weight:800;letter-spacing:-.3px;line-height:1.1}
  header .sub{font-size:11.5px;opacity:.75;margin-top:2px}
  .brand{background:#fff;border-radius:8px;padding:8px 13px;display:flex;align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.22);flex:none}
  .brand svg{display:block;height:50px;width:auto}
  .chips{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:20px;
    padding:4px 11px;font-size:11px;white-space:nowrap}
  .btn-logout{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;
    border-radius:20px;font-size:11px;padding:5px 13px}
  @media(max-width:640px){header h1{font-size:19px}.brand svg{height:40px}}

  main{padding:16px 22px 46px;max-width:none;margin:0 auto}
  .toprow{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:900px){.toprow{grid-template-columns:1fr}}

  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(15,47,95,.05)}
  .panel > h2{background:var(--panel);color:#fff;margin:0;font-size:13px;font-weight:700;padding:10px 14px;
    display:flex;align-items:center;gap:9px}
  .panel > h2 .right{margin-left:auto;font-weight:500;font-size:11px;opacity:.85}
  .panel .body{padding:14px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .f{display:flex;flex-direction:column;gap:5px}
  .f.span2{grid-column:span 2}
  .f label{font-size:12px;font-weight:700;color:#41506b}
  .f .req{color:var(--red)}
  .btn-primary{background:var(--navy-2);color:#fff;font-weight:700}
  .btn-primary:hover{background:#163f78}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:#41506b}
  .btn-danger{background:var(--red);color:#fff}
  .formfoot{margin-top:10px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .formfoot .msg{font-size:12.5px;font-weight:600}
  .formfoot .msg.err{color:var(--red)}
  .formfoot .msg.ok{color:var(--green)}
  .formrow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .formrow .f{flex:1 1 150px;min-width:140px}
  .formrow .f.grow{flex:2 1 190px}
  .formrow .f.addbtn{flex:0 0 auto;min-width:0}
  .formrow .f.addbtn button{padding:9px 24px}
  .formrow .f.dcount{flex:0 0 92px;min-width:80px}

  .tabbar{background:#fff;border-bottom:1px solid var(--line);padding:0 18px;display:flex;gap:4px}
  .tab{background:transparent;border:0;border-bottom:3px solid transparent;border-radius:0;
    padding:12px 16px;font-size:13.5px;font-weight:700;color:#6b7a90}
  .tab:hover{color:var(--navy-2)}
  .tab.active{color:var(--navy-1);border-bottom-color:#f6821f}
  .tabbar{align-items:center}
  .tb-note{margin-left:auto;font-size:11.5px;color:var(--muted);padding:0 4px;white-space:nowrap}
  @media(max-width:680px){.tb-note{display:none}}

  .settings{max-width:1200px}
  .statsyear{display:flex;align-items:center;gap:8px;margin:2px 0 12px;font-size:12.5px;color:#41506b}
  .statsyear b{font-size:14px;color:var(--navy-1);min-width:46px;text-align:center}
  .nav.sm{width:30px;height:30px;font-size:15px}
  .addperson input{flex:1;min-width:150px}
  .tblwrap{overflow-x:auto}
  .ptable{width:100%;border-collapse:collapse;font-size:13px}
  .ptable th{background:#16355f;color:#fff;text-align:left;padding:9px 11px;font-size:10.5px;
    letter-spacing:.5px;text-transform:uppercase;font-weight:700}
  .ptable th.num{text-align:right}
  .ptable td{padding:8px 11px;border-bottom:1px solid #eef1f5;vertical-align:middle}
  .ptable tbody tr:hover td{background:#f7f9fc}
  .ptable td.nm{font-weight:600;white-space:nowrap}
  .ptable td.num{text-align:right;font-variant-numeric:tabular-nums}
  .ptable td.num b{font-size:14px;color:var(--navy-1)}
  .ptable td.num b.neg{color:var(--red)}
  .ptable td.num .of{color:var(--muted);font-size:11px}
  .ptable td.ta-c{text-align:center}
  .ptable .proc{padding:6px 8px;font-size:12.5px;max-width:280px}
  .ptable .rm{background:transparent;border:0;color:#9aa7b8;font-size:16px;line-height:1;padding:2px 6px}
  .ptable .rm:hover{color:var(--red)}
  .ptable .tempty{color:var(--muted);text-align:center;padding:22px}

  /* ---- lidé ---- */
  .people{display:flex;flex-direction:column;gap:7px;max-height:210px;overflow:auto}
  .prow{display:flex;align-items:center;gap:8px;background:#f7f9fc;border:1px solid var(--line);
    border-radius:8px;padding:7px 8px 7px 12px}
  .prow .pinfo{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
  .prow .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .vac{font-size:11px;color:var(--muted)}
  .prow .vac b{color:#41506b;font-variant-numeric:tabular-nums}
  .prow .vac b.neg{color:var(--red)}
  .prow button{background:transparent;border:0;color:#9aa7b8;font-size:16px;line-height:1;padding:2px 6px}
  .prow button:hover{color:var(--red)}
  .addperson{display:flex;gap:8px;margin-bottom:11px}
  .addperson input{flex:1}

  /* ---- legenda ---- */
  .twoforms{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
  @media(max-width:900px){.twoforms{grid-template-columns:1fr}}
  .legend .lg-h{font-weight:800;color:#41506b;margin-right:2px}
  .legend+.legend{margin-top:-6px}
  .hintmini{font-size:11.5px;color:var(--muted);flex:1;min-width:180px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:10px 14px;margin-bottom:12px;
    background:#fff;border:1px solid var(--line);border-radius:12px;font-size:12px;color:#41506b}
  .legend .item{display:flex;align-items:center;gap:7px;white-space:nowrap}
  .legend .sw{width:20px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.08)}

  /* ---- kalendář ---- */
  .calbar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .calbar .yr{font-size:17px;font-weight:800;color:var(--navy-1);min-width:230px;text-align:center}
  .calbar button.nav{background:#fff;border:1px solid var(--line);color:var(--navy-2);font-size:16px;
    font-weight:800;width:38px;height:38px;border-radius:10px;padding:0}
  .calbar button.nav:hover{background:#eef3fb}
  .calbar .hint{margin-left:auto;font-size:11.5px;color:var(--muted)}

  .cal-wrap{overflow:auto;max-height:76vh;border:1px solid var(--line);border-radius:12px;background:#fff}
  table.cal{border-collapse:separate;border-spacing:0;table-layout:fixed;font-size:11px}
  .cal col.namecol{width:190px}
  .cal col.dcol{width:29px}
  .cal th,.cal td{border-right:1px solid #eef1f6;border-bottom:1px solid #eef1f6;text-align:center;padding:0;height:33px}
  .cal thead th{background:#f7f9fc;color:#41506b;font-weight:700;user-select:none}
  .cal tr.months th{position:sticky;top:0;z-index:4;height:27px;font-size:12px;letter-spacing:.4px;
    text-transform:uppercase;background:#e7eefb;color:var(--navy-2);border-bottom:1px solid #d0dcef}
  .cal tr.months th.malt{background:#dbe6f7}
  .cal tr.days th{position:sticky;top:27px;z-index:4;height:31px;font-size:11px;color:#5b6b82;font-weight:600;line-height:1.05}
  .cal tr.days th .wd{display:block;font-size:8.5px;font-weight:600;color:#aab4c2}
  .cal tr.days th.today .wd{color:#ffe6d5}
  .cal .malt{background:#f1f4fa}
  .cal .corner{position:sticky;left:0;z-index:7;background:#e7eefb;text-align:left;padding:0 12px;
    box-shadow:2px 0 0 #d0dcef}
  .cal tr.months th.corner{z-index:8;font-size:13px}
  .cal tr.days th.corner{z-index:8;background:#f7f9fc;font-size:11px;text-transform:none;letter-spacing:0;color:#41506b}
  .cal td.name{position:sticky;left:0;z-index:3;background:#fff;text-align:left;padding:0 12px;font-weight:600;
    font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:2px 0 0 #e6ebf2}
  .cal tbody tr:hover td.name{background:#f7f9fc}
  .cal td.d{cursor:pointer}
  .cal td.d:hover{outline:2px solid #2a5ea3;outline-offset:-2px;position:relative;z-index:2}
  .cal th.we,.cal td.we{background:#e9edf3}
  .cal th.hol,.cal td.hol{background:#e6d9fb}
  .cal th.hol{color:#6d3fc4}
  .cal .mstart{border-left:2px solid #c3d0e2}
  .cal tr.days th.today{background:#f6821f;color:#fff;font-weight:800;border-radius:5px}
  .cal-inner{position:relative;width:max-content;min-width:100%}
  .cal td.d .lab{font-size:9px;font-weight:800;color:rgba(25,30,42,.34);pointer-events:none;letter-spacing:0}
  .cal td.shift .lab.lab-sh{font-size:9px;color:rgba(20,32,50,.62);font-weight:800}
  /* směna naplánovaná pod nepřítomností: jemná modrá linka dole */
  .cal td.hasshift{box-shadow:inset 0 -3px 0 rgba(37,99,168,.4)}
  /* Dnešek: prázdná políčka lehce oranžová, políčka s nepřítomností nechají svou barvu vyniknout */
  .cal td.today:not(.has){background:#fde3c8}
  /* Pruh dneška = jen oranžové linky po stranách sloupce (nepřekrývá barvy nepřítomností) */
  .today-band{position:absolute;top:0;bottom:0;z-index:2;pointer-events:none;
    box-shadow:inset 3px 0 0 #e8590c,inset -3px 0 0 #e8590c}
  .cal td.holmark{box-shadow:inset 0 3px 0 #9b6ff0}
  /* nadpis úseku (skupiny pozic) v kalendáři */
  .cal tr.grp td{background:#e7eefb;border-top:2px solid #c3d0e2;border-bottom:1px solid #c3d0e2;height:24px}
  .cal tr.grp td.grp-name{position:sticky;left:0;z-index:3;text-align:left;padding:0 12px;font-size:11px;
    font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--navy-2);white-space:nowrap;box-shadow:2px 0 0 #c3d0e2}
  .cal tr.grp td.grp-name .grp-n{opacity:.6;font-weight:600}
  .cal tr.grp:hover td.grp-name{background:#e7eefb}

  .empty-cal{padding:34px;text-align:center;color:var(--muted)}

  /* ---- přihlášení ---- */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#0f2f5f,#2a5ea3);padding:16px}
  .login{background:#fff;border-radius:14px;width:360px;padding:26px;box-shadow:0 22px 55px rgba(0,0,0,.35)}
  .login .brand{margin:0 auto 18px;box-shadow:none;border:1px solid var(--line);width:max-content}
  .login .brand svg{height:56px}
  .login h2{margin:0 0 3px;font-size:18px;text-align:center}
  .login p.s{margin:0 0 18px;font-size:11.5px;color:var(--muted);text-align:center}
  .login .f{margin-bottom:12px}
  .login button{width:100%;padding:10px;font-size:13px}
  .login .hint{margin-top:15px;font-size:11px;color:var(--muted);line-height:1.7;
    border-top:1px solid var(--line);padding-top:12px;text-align:center}
  .loginerr{background:#fdecea;border:1px solid #f5cfca;color:var(--red);font-size:11.5px;
    padding:8px 10px;border-radius:8px;margin-bottom:12px;font-weight:600}

  /* ---- dialog ---- */
  .dlg-wrap{position:fixed;inset:0;background:rgba(12,26,48,.55);display:flex;align-items:center;
    justify-content:center;z-index:80;padding:16px}
  .dlg{background:#fff;border-radius:12px;max-width:440px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.35);overflow:hidden}
  .dlg.dlg-lg{max-width:600px}
  .egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .egrid .f.span2{grid-column:span 2}
  .egrid .f.span3{grid-column:span 3}
  .egrid .f label{font-size:12px;font-weight:700;color:#41506b;margin-bottom:4px;display:block}
  .dlg .b .grow1{flex:1}
  @media(max-width:560px){.egrid{grid-template-columns:1fr 1fr}.egrid .f.span2,.egrid .f.span3{grid-column:span 2}}
  .dlg .t{background:linear-gradient(90deg,var(--navy-1),var(--navy-2));color:#fff;padding:12px 16px;
    font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
  .dlg .t .x{margin-left:auto;background:transparent;border:0;color:#fff;font-size:18px;padding:0 4px}
  .dlg .c{padding:16px;font-size:13px;line-height:1.6}
  .dlg .b{padding:12px 16px;border-top:1px solid var(--line);background:#fafbfd;display:flex;gap:8px;
    justify-content:flex-end;flex-wrap:wrap}
  .absitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;margin-bottom:8px}
  .absitem .dot{width:14px;height:14px;border-radius:4px;flex:none}
  .absitem .info{flex:1}
  .absitem .info b{font-size:13px}
  .absitem .info div{font-size:11.5px;color:var(--muted)}

  /* ---- toast ---- */
  .toast{position:fixed;right:16px;bottom:16px;z-index:90;background:#16233a;color:#fff;border-radius:10px;
    padding:11px 15px;font-size:12.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);max-width:380px}
  .toast.err{background:var(--red)}
  .toast.ok{background:var(--green)}

  /* ===== MOBIL (musí být až na konci CSS, aby přebilo výchozí pravidla) ===== */
  @media(max-width:680px){
    header{padding:10px 12px;gap:10px}
    header h1{font-size:18px}
    header .sub{display:none}
    main{padding:12px 10px 30px}
    .panel .body{padding:11px}
    .formrow .f{flex:1 1 100%;min-width:0}
    .legend{gap:5px 9px;font-size:9.5px;padding:7px 9px}
    .legend .item{gap:5px}
    .legend .sw{width:13px;height:10px}
    .calbar .hint{display:none}
    .calbar .yr{min-width:70px;font-size:16px}
    .cal-wrap{max-height:66vh}
    .cal td.name{font-size:12px;padding:0 8px}
    .cal tr.days th{font-size:10px}
    .settings{max-width:none}
    .addperson{flex-direction:column}
    .addperson input,.addperson .btn-primary{width:100%}
    .ptable{font-size:12px}
    .ptable th,.ptable td{padding:7px 6px}
    .ptable .proc{max-width:none}
  }
</style>
</head>
<body>
<div id="app"><div class="login-wrap"><div class="login"><h2>Načítám…</h2><p class="s">Připojuji se k Firebase.</p></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

/* ====== FIREBASE KONFIGURACE (projekt dovolenky) ======
   Jde o veřejné frontendové klíče – je správné a bezpečné mít je zde v kódu.
   Zabezpečení řeší pravidla Firestore (firestore.rules), ne skrývání klíčů. */
const firebaseConfig = {
  apiKey: "AIzaSyDi3OVq2Al0WXFPgqhMAN9lPGuExOU80Cc",
  authDomain: "nakupni-pozadavky.firebaseapp.com",
  projectId: "nakupni-pozadavky",
  storageBucket: "nakupni-pozadavky.firebasestorage.app",
  messagingSenderId: "214674774365",
  appId: "1:214674774365:web:7f7b51c8169b75f8acb0b4",
  measurementId: "G-BGDMXEWBQH"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

function logoSvg(){
  return `<svg viewBox="0 0 300 138" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YFAI minimo">
    <defs>
      <pattern id="yfai-stripes" patternUnits="userSpaceOnUse" x="0" y="8" width="10" height="9.8">
        <rect x="0" y="0" width="10" height="5.9" fill="#1f66b5"/>
      </pattern>
    </defs>
    <text x="150" y="86" text-anchor="middle" fill="url(#yfai-stripes)"
      font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="108"
      textLength="244" lengthAdjust="spacingAndGlyphs">YFAI</text>
    <text x="150" y="128" text-anchor="middle" fill="#111418"
      font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="42"
      letter-spacing="1" textLength="246" lengthAdjust="spacingAndGlyphs">minimo</text>
  </svg>`;
}

/* ==========================================================
   Dovolenky — evidence nepřítomnosti (Firestore + Auth)
   Kolekce ve Firestore (projekt dovolenky):
     people    — naši lidé  { name, order, createdAt }
     absences  — nepřítomnosti { personId, personName, type, from, to, note, createdBy, createdAt }
   Svátky se do databáze neukládají — počítají se v prohlížeči (české státní svátky).
   ========================================================== */

/* Druhy nepřítomnosti + barvy (světlé, moderní). Svátek je zvláštní – dopočítává se automaticky. */
const TYPES = [
  {k:'Dovolená',        fill:'#f5c518', short:'D'},
  {k:'Náhradní volno',  fill:'#35c1d6', short:'NV'},
  {k:'Nemoc',           fill:'#f2726b', short:'N'},
  {k:'Lékař',           fill:'#e879a6', short:'L'},
  {k:'Neplacené volno', fill:'#9aa7b8', short:'NP'},
  {k:'Služební cesta',  fill:'#5b9df5', short:'SC'},
];
const TYPE_BY = Object.fromEntries(TYPES.map(t=>[t.k,t]));
const HOLIDAY_FILL = '#b98cf0';
const DEFAULT_VACATION = 25;   // výchozí nárok na dovolenou (pracovních dní za rok)

const MONTHS = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const WD = ['Ne','Po','Út','St','Čt','Pá','So'];

/* Sekce a pozice (musí odpovídat modulu Nastavení). */
const SECTIONS = [
  {key:'engineering', label:'Engineering', positions:['IMM PE','SLUSH PE','FOAM PE','ASSY PE','GB/DP PE','PE coordinator','Change coordinator','ME manager','AME']},
  {key:'maintenance', label:'Maintenance', positions:['Elektrikář','Mechanik','PLC technik','PLC programátor','Skladník','Spareparts Buyer','MAINTENANCE coordinator','Mistr','Shift leader','Nástrojař','Tooling engineer','Toolshop leader']},
  {key:'toolsetters', label:'Toolsetters', positions:['TS IMM','TS SLUSH','TS FOAM','TS GB/DP','TS ASSY']},
];
const POS2SECTION = {}; SECTIONS.forEach(s=>s.positions.forEach(p=>{POS2SECTION[p]=s.key;}));
const inSection = (u,key) => (u.positions||[]).some(p=>POS2SECTION[p]===key);

/* ---- Směny (přítomnost) ---- barvy zeleno-modro-fialové, ať se nepletou s nepřítomnostmi. */
const SHIFTS = [
  {k:'DEN', name:'Denní',     hours:'Po–Pá', fill:'#e4ecc4'},
  {k:'R',   name:'Ranní',     hours:'6–14',  fill:'#d3ecd0'},

/* ---- Směnové rotace (automatické rozplánování celého roku jedním kliknutím) ----
   Vytěženo z reálného rozpisu „Směny 2026".
   - Údržba 12h: 4 týmy H1–H4, 28denní continental cyklus (krátký/dlouhý týden,
     vždy 1 tým denní 12h, 1 noční 12h, 2 týmy volno = plné 24/7). Kotva = 1.1.2026.
   - Údržba denní: týden ranní / týden odpolední (Po–Pá). Kotva = pondělí 5.1.2026.

   Znak v cyklu: D/N/R/O = směna, V = volno. Mapuje se na kódy směn (map). */
const ROT_PLANS = {

  'H4':   {label:'Údržba 12h – tým H4', section:'maintenance', anchor:'2026-01-01', cycle:'NVVVDDVVNNNVVDDVVVNNVVDDDVVN', map:{D:'D12',N:'N12'}},

const SECTION_ROT = {maintenance:['H1','H2','H3','H4','DAY-R','DAY-O'], toolsetters:['TS-R','TS-N','TS-O'], engineering:['ENG']};
const daysSince = (anchor,ds) => Math.round((Date.parse(ds+'T00:00:00Z')-Date.parse(anchor+'T00:00:00Z'))/86400000);
/* Vrátí kód směny pro osobu a den z její rotace (nebo null pro volno / bez rotace). */
function rotationCodeFor(personId, ds){
  const rot=rotById[personId]; if(!rot) return null;
  const plan=ROT_PLANS[rot.plan]; if(!plan) return null;
  const L=plan.cycle.length, i=((daysSince(plan.anchor,ds)%L)+L)%L, tok=plan.cycle[i];
  if(!tok || tok==='V') return null;
  return plan.map[tok] || tok;
}
/* Levely (kvůli právům – kdo může měnit koho). */
const LEVEL_RANK = {basic:1,warehouse:2,approver:3,wadmin:4,superadmin:5};
const ROLE2LEVEL = {zadavatel:'basic',skladnik:'warehouse',schvalovatel:'approver',admin:'superadmin'};
const levelOf = d => (d && d.level && LEVEL_RANK[d.level]) ? d.level : ((d && ROLE2LEVEL[d.role]) || 'basic');
/* Práva v Plánování – pro každou sekci 4 stavy. Nejsou-li u člověka nastavená,
   odvodí se z jeho levelu (Approver a výše = vše, ostatní = jen sebe). Nastavují se v Nastavení. */
const PERM_BY = {none:'Skryté', read:'Jen číst', self:'Zapisovat jen sebe', all:'Zapisovat všechny'};
const defaultPerm = level => (LEVEL_RANK[level]||1) >= 3 ? 'all' : 'self';
const resolvePerm = (u, sectionKey) => { const p=u&&u.perms&&u.perms[sectionKey];
  return (p && PERM_BY[p]) ? p : defaultPerm(levelOf(u)); };
/* Přístup k celému modulu Plánování (Skryté/Jen číst/Zapisovat) – zastřeší práva sekcí. */
const resolveModule=(mods,level,key)=>{ const p=mods&&mods[key];
  if(p==='none'||p==='read'||p==='write') return p;
  return key==='nastaveni' ? ((LEVEL_RANK[level]||1)>=5?'write':'none') : 'write'; };
const allowedMods=(mods,level)=>['portal',
  resolveModule(mods,level,'nakup')!=='none'?'nakup':null,
  resolveModule(mods,level,'plan')!=='none'?'dovolenky':null,
  resolveModule(mods,level,'nastaveni')!=='none'?'nastaveni':null].filter(Boolean);
const modCap = () => resolveModule(myDoc&&myDoc.modules, levelOf(myDoc), 'plan');
/* Výsledné právo v sekci = právo sekce omezené přístupem k modulu
   (modul „Jen číst" → i sekce jen čtou; modul „Skryté" → nic). */
const secPerm = s => { const base=resolvePerm(myDoc,s), cap=modCap();
  if(cap==='none') return 'none';
  if(cap==='read') return base==='none'?'none':'read';
  return base; };

const canEditAll = () => curPerm()==='all';                  // smí upravovat kohokoli v sekci
const canEditPerson = id => { const pm=curPerm(); return pm==='all' || (pm==='self' && id===(me&&me.uid)); };

/* Velikonoční neděle (Meeus/Jones/Butcher) – pro Velký pátek a Velikonoční pondělí. */
function easterSunday(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
    month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(y,month-1,day);
}
/* České státní svátky pro daný rok → Map 'YYYY-MM-DD' → název. */
function czHolidays(y){
  const map=new Map();
  const fixed=[[0,1,'Nový rok'],[4,1,'Svátek práce'],[4,8,'Den vítězství'],
    [6,5,'Cyril a Metoděj'],[6,6,'Jan Hus'],[8,28,'Den české státnosti'],
    [9,28,'Vznik ČSR'],[10,17,'Den boje za svobodu'],[11,24,'Štědrý den'],
    [11,25,'1. svátek vánoční'],[11,26,'2. svátek vánoční']];
  fixed.forEach(([m,d,n])=>map.set(iso(y,m,d),n));
  const es=easterSunday(y);
  const gf=new Date(es);gf.setDate(es.getDate()-2);
  const em=new Date(es);em.setDate(es.getDate()+1);
  map.set(iso(gf.getFullYear(),gf.getMonth(),gf.getDate()),'Velký pátek');
  map.set(iso(em.getFullYear(),em.getMonth(),em.getDate()),'Velikonoční pondělí');
  return map;
}

/* Projde všechny dny nepřítomnosti od–do (včetně). */
function eachDay(from,to,cb){
  let d=new Date(from+'T00:00:00'), end=new Date(to+'T00:00:00');
  let guard=0;
  while(d<=end && guard++<800){ cb(iso(d.getFullYear(),d.getMonth(),d.getDate())); d.setDate(d.getDate()+1); }
}
/* Svátky s cache (rychlejší opakované dotazy). */
const _holCache={};
function holsOf(y){ return _holCache[y] || (_holCache[y]=czHolidays(y)); }
const isWorkday = ds => { const dow=new Date(ds+'T00:00:00').getDay();
  return dow!==0 && dow!==6 && !holsOf(+ds.slice(0,4)).get(ds); };
/* Počet pracovních dnů (bez víkendů a svátků) v rozsahu od–do. */
function workingDays(from,to){
  if(!from||!to||to<from) return 0;
  let n=0; eachDay(from,to,ds=>{ if(isWorkday(ds)) n++; });
  return n;
}
/* Den, který se pro danou osobu plánuje: běžně jen pracovní den; u 24/7 (Maintenance) i víkend a svátek. */
const isPlannable = (u,ds) => is247(u) ? true : isWorkday(ds);
/* Počet plánovatelných dnů v rozsahu pro danou osobu. */
function plannableDays(u,from,to){
  if(!from||!to||to<from) return 0;
  let n=0; eachDay(from,to,ds=>{ if(isPlannable(u,ds)) n++; });
  return n;
}
/* Český popis počtu dnů. */
function dayLabel(n){ n=Number(n);
  if(n===0.5) return '0,5 dne';
  if(n===1) return '1 den';
  if(Number.isInteger(n) && n>=2 && n<=4) return n+' dny';
  return String(n).replace('.',',')+' dní'; }

async function addAbsence(bypass){
  formMsg=''; formMsgKind='';
  // Vezmi aktuální hodnoty přímo z formuláře (co je vidět, to platí)
  const selEl=document.getElementById('fa-person'); if(selEl) form.personId=selEl.value;
  const fEl=document.getElementById('fa-from'); if(fEl) form.from=fEl.value;
  const tEl=document.getElementById('fa-to'); if(tEl) form.to=tEl.value;
  const yEl=document.getElementById('fa-type'); if(yEl) form.type=yEl.value;
  const nEl=document.getElementById('fa-note'); if(nEl) form.note=nEl.value;
  const dEl=document.getElementById('fa-days'); if(dEl) form.days=parseFloat(String(dEl.value).replace(',','.'))||0;
  const p=allUsers.find(x=>x.id===form.personId);
  if(!p){ formMsg='Vyberte zaměstnance.'; formMsgKind='err'; render(); return; }
  if(!canEditPerson(p.id)){ formMsg='Můžete zadávat jen svoji nepřítomnost.'; formMsgKind='err'; render(); return; }
  if(!form.from||!form.to){ formMsg='Vyplňte datum od i do.'; formMsgKind='err'; render(); return; }
  if(form.to<form.from){ formMsg='Datum „do" nesmí být před „od".'; formMsgKind='err'; render(); return; }
  if(!TYPE_BY[form.type]){ formMsg='Vyberte druh nepřítomnosti.'; formMsgKind='err'; render(); return; }
  if(!(form.days>0) || Math.round(form.days*2)!==form.days*2){
    formMsg='Počet dnů musí být násobek 0,5 (např. 0,5, 1, 2,5).'; formMsgKind='err'; render(); return; }
  // Půlden = jeden den (diagonální políčko); celé dny = počet plánovatelných dnů v rozsahu
  // (u Maintenance 24/7 se počítají i víkendy a svátky).
  let fromD=form.from, toD=form.to, days=form.days;
  if(days===0.5){ toD=fromD; }
  else{ days=plannableDays(p,fromD,toD);
    if(days<=0){ formMsg='V zadaném rozsahu nejsou žádné plánovatelné dny.'; formMsgKind='err'; render(); return; } }
  // Kontrola kolize: dovolená s kolegou ze stejného úseku
  if(!bypass && form.type==='Dovolená'){
    const list=findCollisions(p, fromD, toD);
    if(list.length){ collision={list, from:fromD, to:toD}; render(); return; }
  }
  try{
    await addDoc(collection(db,'absences'),{
      personId:p.id, personName:p.name, type:form.type,
      from:fromD, to:toD, note:form.note.trim(), days,
      createdBy:me.email, createdAt:serverTimestamp()
    });
    form={personId:p.id,from:fromD,to:toD,type:form.type,note:'',days};
    formMsg='Nepřítomnost přidána.'; formMsgKind='ok'; collision=null;
    render();
  }catch(e){ formMsg='Nepodařilo se uložit: '+e.message; formMsgKind='err'; render(); }
}
/* Najde kolegy, kteří umí ALESPOŇ JEDNU stejnou pozici a mají v termínu dovolenou
   (kontrola zastupitelnosti napříč sekcemi). */
function findCollisions(person, from, to){
  const myPos=new Set(person.positions||[]);
  if(!myPos.size) return [];
  const list=[];
  allUsers.forEach(o=>{
    if(o.id===person.id) return;
    const shared=(o.positions||[]).filter(p=>myPos.has(p));
    if(!shared.length) return;
    absences.forEach(a=>{
      if(a.personId!==o.id || a.type!=='Dovolená') return;
      if(a.from<=to && a.to>=from) list.push({name:o.name, from:a.from, to:a.to, process:shared.join(', ')});
    });
  });
  return list;
}

  if(!sform.from||!sform.to){ sformMsg='Vyplňte datum od i do.'; sformMsgKind='err'; render(); return; }
  if(sform.to<sform.from){ sformMsg='Datum „do" nesmí být před „od".'; sformMsgKind='err'; render(); return; }
  const allowed=SECTION_SHIFTS[section]||[];
  if(!allowed.includes(sform.shift)){ sformMsg='Vyberte druh směny.'; sformMsgKind='err'; render(); return; }
  const cnt=plannableDays(p,sform.from,sform.to);
  if(cnt<=0){ sformMsg='V zadaném rozsahu nejsou žádné plánovatelné dny.'; sformMsgKind='err'; render(); return; }
  try{
    await addDoc(collection(db,'shifts'),{
      personId:p.id, personName:p.name, shift:sform.shift,
      from:sform.from, to:sform.to, createdBy:me.email, createdAt:serverTimestamp()
    });
    sform={personId:p.id, from:sform.from, to:sform.to, shift:sform.shift};
    sformMsg='Směna naplánována.'; sformMsgKind='ok'; render();
  }catch(e){ sformMsg='Nepodařilo se uložit: '+e.message; sformMsgKind='err'; render(); }
}

/* Kalendář: při prvním zobrazení roku srovná pohled tak, aby aktuální měsíc
   byl vlevo (ostatní roky na leden). Jinak zachová dosavadní odscrollování. */
function alignCalendar(){
  const wrap=document.querySelector('.cal-wrap'); if(!wrap) return;
  if(calYear!==alignedYear){
    if(!wrap.querySelector('table.cal')){ wrap.scrollLeft=calScrollL; return; } // ještě bez dat – příště
    alignedYear=calYear;
    const now=new Date();
    if(calYear===now.getFullYear()){
      const mob=window.innerWidth<=680, DC=mob?30:34;
      let idx=0; for(let m=0;m<now.getMonth();m++) idx+=new Date(calYear,m+1,0).getDate();
      wrap.scrollLeft=idx*DC;            // první den aktuálního měsíce k levému okraji
    }else wrap.scrollLeft=0;
    calScrollL=wrap.scrollLeft;
  }else{ wrap.scrollLeft=calScrollL; wrap.scrollTop=calScrollT; }
}

/* Umístí zvýrazňovací pruh přesně na sloupec dneška. */
function positionTodayBand(){
  const band=document.querySelector('.today-band'), inner=document.querySelector('.cal-inner');
  const td=document.querySelector('td.today');
  if(!band||!inner||!td){ if(band) band.style.display='none'; return; }
  const ir=inner.getBoundingClientRect(), tr=td.getBoundingClientRect();
  band.style.display='';
  band.style.left = (tr.left-ir.left)+'px';
  band.style.width = tr.width+'px';
}

/* Sestaví strukturu roku (měsíce → dny) i mapu svátků. */
function buildYear(y){
  const hol=czHolidays(y), t=today(), now=new Date(), cy=now.getFullYear(), cm=now.getMonth();
  const months=[];
  for(let m=0;m<12;m++){
    const dim=new Date(y,m+1,0).getDate(), days=[], alt=(m%2===1);
    for(let d=1;d<=dim;d++){
      const ds=iso(y,m,d), dow=new Date(y,m,d).getDay();
      days.push({ds,d,m,alt,first:d===1,mcur:(y===cy&&m===cm&&d===1),dow,
        weekend:(dow===0||dow===6),holiday:hol.get(ds)||'',today:ds===t});
    }
    months.push({name:MONTHS[m],m,alt,days});
  }
  return months;
}
/* Statistika dovolené osoby za zvolený rok: kolik má rozplánováno a kolik zbývá.
   Počítají se jen dny typu „Dovolená" a jen pracovní dny (bez víkendů a svátků). */
function vacStats(personId, year){
  const y=year||calYear, yStart=iso(y,0,1), yEnd=iso(y,11,31);
  let planned=0;
  absences.forEach(a=>{
    if(a.personId!==personId || a.type!=='Dovolená' || !a.from || !a.to) return;
    if(a.days===0.5){                                  // půlden se počítá jako 0,5
      if(a.from>=yStart && a.from<=yEnd) planned+=0.5;
      return;
    }
    if(a.to<yStart || a.from>yEnd) return;
    eachDay(a.from<yStart?yStart:a.from, a.to>yEnd?yEnd:a.to, ds=>{
      if(isWorkday(ds)) planned++;   // jen pracovní dny (víkend ani svátek dovolenou neujídají)
    });
  });
  return {planned, remaining: DEFAULT_VACATION - planned};
}
const personById = id => allUsers.find(u=>u.id===id) || null;
/* Mapa nepřítomností pro rozsah dat: personId → { 'YYYY-MM-DD': absence }.
   Vyplňují se plánovatelné dny osoby (u Maintenance 24/7 i víkend/svátek).
   Půlden (days===0.5) je jen jeden den. */
function absenceMap(startDs,endDs){
  const by={};
  absences.forEach(a=>{
    if(!a.from||!a.to) return;
    if(a.days===0.5){                                  // půlden = jediné políčko
      const ds=a.from;
      if(ds<startDs||ds>endDs) return;
      (by[a.personId]||(by[a.personId]={}))[ds]=a;
      return;
    }
    if(a.to<startDs||a.from>endDs) return;
    const pu=personById(a.personId);
    (by[a.personId]||(by[a.personId]={}));
    eachDay(a.from<startDs?startDs:a.from, a.to>endDs?endDs:a.to, ds=>{
      if(isPlannable(pu,ds)) by[a.personId][ds]=a;
    });
  });
  return by;
}
/* Mapa směn (přítomnosti): personId → { 'YYYY-MM-DD': shift }. */
function shiftMap(startDs,endDs){
  const by={};
  shifts.forEach(s=>{
    if(!s.from||!s.to || s.to<startDs || s.from>endDs) return;
    const pu=personById(s.personId);
    (by[s.personId]||(by[s.personId]={}));
    eachDay(s.from<startDs?startDs:s.from, s.to>endDs?endDs:s.to, ds=>{
      if(isPlannable(pu,ds)) by[s.personId][ds]=s;
    });
  });
  return by;
}

function calendarView(){
  if(!people.length){
    const sl=SECTIONS.find(s=>s.key===section);
    return `<div class="cal-wrap"><div class="empty-cal">V sekci <b>${esc(sl?sl.label:'')}</b> zatím nejsou žádní lidé.<br>Přiřaď lidem pozice této sekce v modulu <b>⚙️ Nastavení</b>.</div></div>`;
  }
  const mob=window.innerWidth<=680;
  const NC=mob?110:180, DC=mob?30:34;
  const months=buildYear(calYear), by=absenceMap(iso(calYear,0,1),iso(calYear,11,31)), sm=shiftMap(iso(calYear,0,1),iso(calYear,11,31));
  const allDays=months.flatMap(mo=>mo.days);
  const colgroup=`<colgroup><col style="width:${NC}px">${allDays.map(()=>`<col style="width:${DC}px">`).join('')}</colgroup>`;
  const monthsRow=`<tr class="months"><th class="corner">${calYear}</th>${
    months.map(mo=>`<th class="mstart ${mo.alt?'malt':''}" colspan="${mo.days.length}">${mo.name}</th>`).join('')}</tr>`;
  const daysRow=`<tr class="days"><th class="corner">Zaměstnanec</th>${
    allDays.map(dd=>{
      let cls='';
      if(dd.holiday)cls='hol'; else if(dd.weekend)cls='we'; else if(dd.alt)cls='malt';
      if(dd.first)cls+=' mstart'; if(dd.mcur)cls+=' mcur';
      if(dd.today)cls+=' today';
      const tt=dd.holiday?`Svátek: ${dd.holiday}`:dCz(dd.ds);
      return `<th class="${cls}" title="${esc(tt)}"><span class="wd">${WD[dd.dow]}</span>${dd.d}</th>`;
    }).join('')}</tr>`;
  // jeden řádek osoby (buňky dnů)
  const personRow = p => {
    const pm=by[p.id]||{}, sp=sm[p.id]||{};
    // efektivní směna dne: ručně zadaná směna má přednost před rotací
    const eff = ds2 => { const mm=sp[ds2]; if(mm) return {code:mm.shift, id:mm.id};
      const rc=rotationCodeFor(p.id,ds2); return rc?{code:rc, rot:true}:null; };
    const cells=allDays.map((dd,i)=>{
      const a=pm[dd.ds], s=eff(dd.ds);
      let cls='d', style='', tt=`${p.name} • ${dCz(dd.ds)}`, inner='';
      if(dd.holiday)cls+=' hol'; else if(dd.weekend)cls+=' we'; else if(dd.alt)cls+=' malt';
      if(dd.first)cls+=' mstart'; if(dd.mcur)cls+=' mcur';
      if(dd.today)cls+=' today';
      if(dd.holiday)tt+=` • Svátek: ${dd.holiday}`;
      if(a){
        cls+=' has';                         // má nepřítomnost → dnešek ji nepodbarvuje
        const T=TYPE_BY[a.type]||{fill:'#ccc',short:'?'};
        if(a.days===0.5){                    // půlden: políčko rozdělené úhlopříčně napůl
          style=`background:linear-gradient(135deg, transparent 0 50%, ${T.fill} 50% 100%)`;
          cls+=' half';
        }else{
          style=`background:${T.fill}`;
          const nx=allDays[i+1];             // souvislý pruh: zakryj předěl mezi stejnými dny
          if(nx && !nx.first && pm[nx.ds] && pm[nx.ds].id===a.id) style+=`;border-right-color:${T.fill}`;
        }
        if(dd.holiday)cls+=' holmark';
        inner=`<span class="lab">${T.short}</span>`;   // slabé písmeno typu v každé buňce
        tt+=` • ${a.type}${a.days?(' ('+dayLabel(a.days)+')'):''}${a.note?(' — '+a.note):''}`;
        if(s){ cls+=' hasshift'; tt+=` • plánovaná směna: ${SHIFT_BY[s.code]?SHIFT_BY[s.code].name:s.code}`; }
      }else if(s){                            // směna (přítomnost) – jen když tu není nepřítomnost
        cls+=' has shift'+(s.rot?' shift-rot':'');
        const S=SHIFT_BY[s.code]||{fill:'#dfe6ee',name:s.code};
        style=`background:${S.fill}`;
        const nx=allDays[i+1], ns=(nx && !nx.first)?eff(nx.ds):null;   // souvislý pruh stejné směny
        if(ns && ns.code===s.code) style+=`;border-right-color:${S.fill}`;
        if(dd.holiday)cls+=' holmark';
        inner=`<span class="lab lab-sh">${esc(s.code)}</span>`;
        tt+=` • směna ${S.name}${S.hours?(' ('+S.hours+')'):''}${s.rot?' (rotace)':''}`;
      }
      return `<td class="${cls}" style="${style}" data-person="${p.id}" data-date="${dd.ds}" title="${esc(tt)}">${inner}</td>`;
    }).join('');
    return `<tr><td class="name" title="${esc(p.name)}">${esc(p.name)}</td>${cells}</tr>`;
  };
  // rozdělení tabulky po úsecích (pozicích) sekce: nadpis úseku + lidé abecedně pod ním.
  // Kdo má v sekci víc úseků, zařadí se jen do PRVNÍHO ze svých úseků (objeví se jednou).
  const secPositions=(SECTIONS.find(s=>s.key===section)||{}).positions||[];
  const primaryPos = p => (p.positions||[]).find(pos=>POS2SECTION[pos]===section);
  const groupsByPos={};
  people.forEach(p=>{ const pos=primaryPos(p); if(!pos) return; (groupsByPos[pos]||(groupsByPos[pos]=[])).push(p); });
  const rowsHtml=[];
  secPositions.forEach(pos=>{
    const grp=(groupsByPos[pos]||[]).sort(bySurname);
    if(!grp.length) return;
    rowsHtml.push(`<tr class="grp"><td class="name grp-name" title="${esc(pos)}">${esc(pos)} <span class="grp-n">(${grp.length})</span></td><td class="grp-fill" colspan="${allDays.length}"></td></tr>`);
    grp.forEach(p=>rowsHtml.push(personRow(p)));
  });
  const body=rowsHtml.join('');
  return `<div class="cal-wrap"><div class="cal-inner"><table class="cal">${colgroup}<thead>${monthsRow}${daysRow}</thead><tbody>${body}</tbody></table><div class="today-band" style="display:none"></div></div></div>`;
}

function editShiftView(){
  const e=editShift;
  const selectable = canEditAll() ? allUsers : allUsers.filter(p=>p.id===(me&&me.uid)||p.id===e.personId);
  const opts=selectable.map(p=>`<option value="${p.id}" ${e.personId===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  // nabídni směny sekcí osoby (podle jejích pozic); fallback = všechny směny
  const psec=(personById(e.personId)||{}).positions||[];
  const secKeys=[...new Set(psec.map(p=>POS2SECTION[p]).filter(Boolean))];
  let allowed=[]; secKeys.forEach(k=>(SECTION_SHIFTS[k]||[]).forEach(s=>{if(!allowed.includes(s))allowed.push(s);}));
  if(!allowed.length) allowed=SHIFTS.map(s=>s.k);
  const sOpts=allowed.map(k=>{const s=SHIFT_BY[k];return `<option value="${k}" ${e.shift===k?'selected':''}>${esc(s.name)}${s.hours?(' ('+s.hours+')'):''}</option>`;}).join('');
  return `<div class="dlg-wrap" id="es-wrap"><div class="dlg dlg-lg">
    <div class="t">🕒 Úprava směny<button class="x" id="es-x">✕</button></div>
    <div class="c">
      <div class="egrid">
        <div class="f span3"><label>Zaměstnanec</label><select id="es-person">${opts}</select></div>
        <div class="f"><label>Od</label><input type="date" id="es-from" value="${e.from}"></div>
        <div class="f"><label>Do</label><input type="date" id="es-to" value="${e.to}"></div>
        <div class="f"><label>Směna</label><select id="es-shift">${sOpts}</select></div>
      </div>
      ${editShiftMsg?`<div class="formfoot"><span class="msg err">${esc(editShiftMsg)}</span></div>`:''}
    </div>
    <div class="b">
      <button class="btn-danger" id="es-del">Smazat</button>
      <span class="grow1"></span>
      <button class="btn-ghost" id="es-cancel">Zrušit</button>
      <button class="btn-primary" id="es-save">Uložit změny</button>
    </div>
  </div></div>`;
}

function renderToast(){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  if(!toastMsg) return;
  const el=document.createElement('div');
  el.className='toast '+toastKind; el.textContent=toastMsg;
  document.body.appendChild(el);
}

/* ==========================================================
   WIRE — navěšení událostí po každém renderu
   ========================================================== */
function wireLogin(){
  const f=document.getElementById('loginForm');
  if(f) f.addEventListener('submit',e=>{e.preventDefault();
    doLogin(document.getElementById('li-email').value, document.getElementById('li-pass').value);});
}

function wireApp(){
  document.getElementById('btn-logout')?.addEventListener('click',()=>signOut(auth));

  // přepínání sekcí (Engineering / Maintenance / Toolsetters)
  document.querySelectorAll('[data-section]').forEach(b=>
    b.addEventListener('click',()=>{
      section=b.getAttribute('data-section'); form.personId=''; alignedYear=null; render();
    }));

  // formulář nepřítomnosti – průběžně držíme stav, ať se při živé aktualizaci nic neztratí
  const bind=(id,key,ev='input')=>{const el=document.getElementById(id);
    if(el) el.addEventListener(ev,()=>{form[key]=el.value;});};
  bind('fa-person','personId','change'); bind('fa-type','type','change'); bind('fa-note','note');
  // Od/Do: po změně přepočítej „počet dnů" (pracovní dny v rozsahu), pokud v poli zrovna nepíšu
  const daysEl=document.getElementById('fa-days');
  const recompDays=()=>{ if(!daysEl || document.activeElement===daysEl) return;
    const d=workingDays(form.from,form.to); if(d>0){ form.days=d; daysEl.value=d; } };
  ['fa-from','fa-to'].forEach(id=>{const el=document.getElementById(id);
    if(el) el.addEventListener('change',()=>{ form[id==='fa-from'?'from':'to']=el.value; recompDays(); });});
  daysEl?.addEventListener('input',()=>{ form.days=parseFloat(String(daysEl.value).replace(',','.'))||0; });
  document.getElementById('fa-add')?.addEventListener('click',()=>addAbsence());

  // formulář směny
  const sbind=(id,key,ev='input')=>{const el=document.getElementById(id);
    if(el) el.addEventListener(ev,()=>{sform[key]=el.value;});};
  sbind('fs-person','personId','change'); sbind('fs-shift','shift','change');
  sbind('fs-from','from','change'); sbind('fs-to','to','change');
  document.getElementById('fs-add')?.addEventListener('click',()=>addShift());

  // rotace (automatické rozplánování)
  document.getElementById('fr-person')?.addEventListener('change',e=>{frPerson=e.target.value;render();});
  document.getElementById('fr-plan')?.addEventListener('change',e=>{frPlan=e.target.value;});
  document.getElementById('fr-add')?.addEventListener('click',()=>assignRotation());
  document.getElementById('fr-clear')?.addEventListener('click',()=>clearRotation(document.getElementById('fr-person').value));

  // rok kalendáře + skok na dnešek
  document.getElementById('yr-prev')?.addEventListener('click',()=>{calYear--;alignedYear=null;calScrollL=0;render();});
  document.getElementById('yr-next')?.addEventListener('click',()=>{calYear++;alignedYear=null;calScrollL=0;render();});
  document.getElementById('go-today')?.addEventListener('click',()=>{
    calYear=new Date().getFullYear(); alignedYear=null; render(); });

  // dialog kolize dovolené
  document.getElementById('col-ok')?.addEventListener('click',()=>{collision=null;addAbsence(true);});
  document.getElementById('col-cancel')?.addEventListener('click',()=>{collision=null;render();});
  document.getElementById('col-x')?.addEventListener('click',()=>{collision=null;render();});
  document.getElementById('col-wrap')?.addEventListener('click',e=>{if(e.target.id==='col-wrap'){collision=null;render();}});

  // klik do kalendáře
  const wrap=document.querySelector('.cal-wrap');
  if(wrap) wrap.addEventListener('click',e=>{
    const td=e.target.closest('td.d'); if(!td) return;
    openDay(td.getAttribute('data-person'), td.getAttribute('data-date'));
  });

  // dialog
  document.getElementById('dlg-x')?.addEventListener('click',()=>{dlg=null;render();});
  document.getElementById('dlg-close')?.addEventListener('click',()=>{dlg=null;render();});
  document.getElementById('dlg-wrap')?.addEventListener('click',e=>{if(e.target.id==='dlg-wrap'){dlg=null;render();}});
  document.querySelectorAll('[data-del-abs]').forEach(b=>
    b.addEventListener('click',()=>removeAbsence(b.getAttribute('data-del-abs'))));

  // editační okno nepřítomnosti
  if(edit){
    const eb=(id,key)=>{const el=document.getElementById(id);
      if(el) el.addEventListener('input',()=>{edit[key]=el.value;});};
    eb('ed-person','personId'); eb('ed-type','type'); eb('ed-note','note');
    const edDays=document.getElementById('ed-days');
    const edRecomp=()=>{ if(!edDays||document.activeElement===edDays) return;
      const d=workingDays(edit.from,edit.to); if(d>0){ edit.days=d; edDays.value=d; } };
    ['ed-from','ed-to'].forEach(id=>{const el=document.getElementById(id);
      if(el) el.addEventListener('change',()=>{ edit[id==='ed-from'?'from':'to']=el.value; edRecomp(); });});
    edDays?.addEventListener('input',()=>{ edit.days=parseFloat(String(edDays.value).replace(',','.'))||0; });
    document.getElementById('ed-save')?.addEventListener('click',saveEdit);
    document.getElementById('ed-del')?.addEventListener('click',()=>{
      if(confirm('Opravdu smazat tento záznam?')) removeAbsence(edit.id); });
    document.getElementById('ed-cancel')?.addEventListener('click',()=>{edit=null;render();});
    document.getElementById('ed-x')?.addEventListener('click',()=>{edit=null;render();});
    document.getElementById('ed-wrap')?.addEventListener('click',e=>{if(e.target.id==='ed-wrap'){edit=null;render();}});
  }

  // editační okno směny
  if(editShift){
    const sb=(id,key)=>{const el=document.getElementById(id); if(el) el.addEventListener('input',()=>{editShift[key]=el.value;});};
    sb('es-person','personId'); sb('es-shift','shift'); sb('es-from','from'); sb('es-to','to');
    document.getElementById('es-save')?.addEventListener('click',saveShift);
    document.getElementById('es-del')?.addEventListener('click',()=>{ if(confirm('Opravdu smazat tuto naplánovanou směnu?')) removeShift(editShift.id); });
    document.getElementById('es-cancel')?.addEventListener('click',()=>{editShift=null;render();});
    document.getElementById('es-x')?.addEventListener('click',()=>{editShift=null;render();});
    document.getElementById('es-wrap')?.addEventListener('click',e=>{if(e.target.id==='es-wrap'){editShift=null;render();}});
  }
}

/* Klik na políčko dne:
   - mám-li právo na tuto osobu a je tam nepřítomnost → editační okno (úprava / smazání),
   - mám-li právo a je prázdno → předvyplní hlavní formulář na tento den,
   - nemám-li právo (jen prohlížení) → otevře náhledové okno bez možnosti úprav. */
function openDay(personId,dateStr){
  const p=people.find(x=>x.id===personId); if(!p) return;
  const items=absences.filter(a=>a.personId===personId && a.from<=dateStr && a.to>=dateStr);
  const mayEdit=canEditPerson(personId);
  if(!mayEdit){
    // jen prohlížení – náhledové okno (bez mazání a úprav)
    const hol=holsOf(+dateStr.slice(0,4)).get(dateStr)||'';
    dlg={personName:p.name, dateStr, items, holiday:hol, readonly:true};
    render();
    return;
  }
  if(items.length){
    const a=items[items.length-1];   // zobrazená nepřítomnost (poslední zapsaná vyhrává)
    edit={id:a.id, personId:a.personId, from:a.from, to:a.to, type:a.type,
      note:a.note||'', days:(a.days!=null?a.days:workingDays(a.from,a.to))};
    editMsg=''; render();
    return;
  }
  // není nepřítomnost → je tam naplánovaná směna? (úprava směny)
  const sh=shifts.filter(s=>s.personId===personId && s.from<=dateStr && s.to>=dateStr);
  if(sh.length){
    const s=sh[sh.length-1];
    editShift={id:s.id, personId:s.personId, from:s.from, to:s.to, shift:s.shift};
    editShiftMsg=''; render();
    return;
  }
  // prázdno → předvyplní formulář nepřítomnosti na tento den
  form={personId,from:dateStr,to:dateStr,type:form.type,note:'',days:1};
  formMsg=''; formMsgKind=''; render();
  document.getElementById('fa-person')?.scrollIntoView({behavior:'smooth',block:'center'});
  toast('Formulář předvyplněn – doplňte druh a uložte.','');
}
