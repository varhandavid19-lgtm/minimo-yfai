<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>minimo · YFAI</title>
<style>
  :root{
    --navy-1:#0f2f5f; --navy-2:#1b4b8f;
    --bg:#f4f6f9; --card:#fff; --line:#dde4ec; --text:#16233a; --muted:#6b7a90;
    --radius:8px; font-synthesis-weight:none;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:13px}
  button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--radius);border:1px solid transparent;padding:8px 13px}
  button:disabled{opacity:.45;cursor:not-allowed}
  input{font-family:inherit;font-size:13.5px;padding:8px 10px;border:1px solid var(--line);
    border-radius:var(--radius);background:#fff;color:var(--text);width:100%}
  input:focus{outline:2px solid #2a5ea3;border-color:#2a5ea3}
  a{color:#2563a8}

  header{background:linear-gradient(90deg,var(--navy-1),var(--navy-2));color:#fff;padding:14px 20px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:23px;margin:0;font-weight:800;letter-spacing:-.3px;line-height:1.1}
  header .sub{font-size:11.5px;opacity:.75;margin-top:2px}
  .brand{background:#fff;border-radius:8px;padding:8px 13px;display:flex;align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.22);flex:none}
  .brand svg{display:block;height:50px;width:auto}
  .chips{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:20px;
    padding:4px 11px;font-size:11px;white-space:nowrap}
  .btn-logout{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;
    border-radius:20px;font-size:11px;padding:5px 13px}
  @media(max-width:640px){header h1{font-size:19px}.brand svg{height:40px}}

  main{padding:26px 20px 48px;max-width:1100px;margin:0 auto}
  .intro{margin:0 0 20px}
  .intro h2{margin:0 0 4px;font-size:19px;color:var(--navy-1)}
  .intro p{margin:0;color:var(--muted);font-size:13.5px}

  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .tile{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:20px;text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(15,47,95,.06);
    transition:transform .12s, box-shadow .12s, border-color .12s;min-height:150px}
  .tile.active:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(15,47,95,.14);border-color:#b9cbe6}
  .tile .ico{font-size:34px;line-height:1}
  .tile .nm{font-size:16px;font-weight:800;color:var(--navy-1)}
  .tile .ds{font-size:12.5px;color:var(--muted);line-height:1.5;flex:1}
  .tile .go{align-self:flex-start;font-size:12px;font-weight:700;color:#2563a8}
  .tile.soon{opacity:.72;cursor:default}
  .tile.soon .badge{align-self:flex-start;background:#eef1f5;color:#6b7a90;border:1px solid var(--line);
    border-radius:20px;padding:3px 10px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#0f2f5f,#2a5ea3);padding:16px}
  .login{background:#fff;border-radius:14px;width:360px;padding:26px;box-shadow:0 22px 55px rgba(0,0,0,.35)}
  .login .brand{margin:0 auto 18px;box-shadow:none;border:1px solid var(--line);width:max-content}
  .login .brand svg{height:56px}
  .login h2{margin:0 0 3px;font-size:18px;text-align:center}
  .login p.s{margin:0 0 18px;font-size:11.5px;color:var(--muted);text-align:center}
  .login .f{margin-bottom:12px;display:flex;flex-direction:column;gap:5px}
  .login label{font-size:12px;font-weight:700;color:#41506b}
  .login button{width:100%;padding:10px;font-size:13px;background:var(--navy-2);color:#fff;font-weight:700}
  .login .hint{margin-top:15px;font-size:11px;color:var(--muted);line-height:1.7;
    border-top:1px solid var(--line);padding-top:12px;text-align:center}
  .loginerr{background:#fdecea;border:1px solid #f5cfca;color:#c0392b;font-size:11.5px;
    padding:8px 10px;border-radius:8px;margin-bottom:12px;font-weight:600}
</style>
</head>
<body>
<div id="app"><div class="login-wrap"><div class="login"><h2>Načítám…</h2><p class="s">Připojuji se k Firebase.</p></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

/* Společný Firebase projekt pro celý portál (nakupni-pozadavky).
   Veřejné frontendové klíče – je správné je mít v kódu, zabezpečení řeší pravidla Firestore. */
const firebaseConfig = {
  apiKey: "AIzaSyDi3OVq2Al0WXFPgqhMAN9lPGuExOU80Cc",
  authDomain: "nakupni-pozadavky.firebaseapp.com",
  projectId: "nakupni-pozadavky",
  storageBucket: "nakupni-pozadavky.firebasestorage.app",
  messagingSenderId: "214674774365",
  appId: "1:214674774365:web:7f7b51c8169b75f8acb0b4",
  measurementId: "G-BGDMXEWBQH"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

/* Společné levely (stejné napříč moduly). Můstek na staré role nákupní appky. */
const LEVEL_KEYS=['basic','warehouse','approver','wadmin','superadmin'];
const ROLE2LEVEL={zadavatel:'basic',skladnik:'warehouse',schvalovatel:'approver',admin:'superadmin'};
const levelOf=d=>(d && d.level && LEVEL_KEYS.includes(d.level)) ? d.level : ((d && ROLE2LEVEL[d.role])||'basic');

/* Zajistí, že přihlášený má záznam v users (aby se objevil ve správě uživatelů). */
async function ensureUserDoc(user){
  const ref=doc(db,'users',user.uid);
  try{
    const snap=await getDoc(ref);
    if(snap.exists()) return snap.data();
    const data={name:(user.email||'').split('@')[0], email:user.email, level:'basic', role:'zadavatel'};
    try{ await setDoc(ref,data); }catch(e){}   // vlastní záznam smí založit každý (pravidla)
    return data;
  }catch(e){ return null; }
}

function logoSvg(){
  return `<svg viewBox="0 0 300 138" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YFAI minimo">
    <defs><pattern id="yfai-stripes" patternUnits="userSpaceOnUse" x="0" y="8" width="10" height="9.8">
      <rect x="0" y="0" width="10" height="5.9" fill="#1f66b5"/></pattern></defs>
    <text x="150" y="86" text-anchor="middle" fill="url(#yfai-stripes)"
      font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="108"
      textLength="244" lengthAdjust="spacingAndGlyphs">YFAI</text>
    <text x="150" y="128" text-anchor="middle" fill="#111418"
      font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="42"
      letter-spacing="1" textLength="246" lengthAdjust="spacingAndGlyphs">minimo</text>
  </svg>`;
}

/* Moduly portálu. active:true = funkční (odkaz), jinak „připravujeme". */
const MODULES = [
  {ico:'🛒', nm:'Nákupní požadavky', ds:'Evidence a schvalování nákupních požadavků ve výrobě.', href:'nakup.html', active:true},
  {ico:'🌴', nm:'Dovolenky',         ds:'Plánování dovolené a nepřítomnosti vedoucích pracovníků.', href:'dovolenky.html', active:true},
  {ico:'⏱️', nm:'Docházka',          ds:'Evidence příchodů a odchodů. Připravujeme.', active:false},
  {ico:'🔧', nm:'Údržba',            ds:'Hlášení a evidence oprav a údržby strojů. Připravujeme.', active:false},
  {ico:'⚠️', nm:'Reklamace',         ds:'Evidence reklamací a neshod kvality. Připravujeme.', active:false},
  {ico:'⚙️', nm:'Nastavení',         ds:'Správa uživatelů a jejich levelů.', href:'nastaveni.html', active:true, superadmin:true},
];

let me=null, myLevel='basic', loginBusy=false, loginErr='';
const appEl=document.getElementById('app');
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

onAuthStateChanged(auth, async (user)=>{
  loginBusy=false;
  if(!user){ me=null; myLevel='basic'; render(); return; }
  me={email:user.email};
  const d=await ensureUserDoc(user);
  myLevel=levelOf(d);
  render();
});

function render(){
  if(!me){ appEl.innerHTML=loginView(); wireLogin(); return; }
  appEl.innerHTML = appView(); wireApp();
}

function loginView(){
  return `<div class="login-wrap"><form class="login" id="loginForm">
    <div class="brand">${logoSvg()}</div>
    <h2>minimo · YFAI</h2>
    <p class="s">Firemní portál aplikací</p>
    ${loginErr?`<div class="loginerr">${esc(loginErr)}</div>`:''}
    <div class="f"><label>E-mail</label><input type="email" id="li-email" autocomplete="username" required></div>
    <div class="f"><label>Heslo</label><input type="password" id="li-pass" autocomplete="current-password" required></div>
    <button type="submit" ${loginBusy?'disabled':''}>${loginBusy?'Přihlašuji…':'Přihlásit se'}</button>
    <div class="hint">Jeden účet platí pro všechny moduly.<br>Účet vám zakládá správce.</div>
  </form></div>`;
}

function appView(){
  const tiles = MODULES.filter(m=> !m.superadmin || myLevel==='superadmin').map(m=> m.active
    ? `<a class="tile active" href="${m.href}">
         <span class="ico">${m.ico}</span>
         <span class="nm">${esc(m.nm)}</span>
         <span class="ds">${esc(m.ds)}</span>
         <span class="go">Otevřít →</span>
       </a>`
    : `<div class="tile soon">
         <span class="ico">${m.ico}</span>
         <span class="nm">${esc(m.nm)}</span>
         <span class="ds">${esc(m.ds)}</span>
         <span class="badge">Připravujeme</span>
       </div>`).join('');
  return `<header>
    <div class="brand">${logoSvg()}</div>
    <div><h1>minimo · YFAI</h1><div class="sub">Firemní portál aplikací</div></div>
    <div class="chips">
      <span class="chip">${esc(me.email)}</span>
      <button class="btn-logout" id="btn-logout">Odhlásit</button>
    </div>
  </header>
  <main>
    <div class="intro"><h2>Vyberte aplikaci</h2><p>Přihlášení platí pro všechny moduly současně.</p></div>
    <div class="tiles">${tiles}</div>
  </main>`;
}

function wireLogin(){
  document.getElementById('loginForm')?.addEventListener('submit',async e=>{
    e.preventDefault(); loginBusy=true; loginErr=''; render();
    try{ await signInWithEmailAndPassword(auth,
      document.getElementById('li-email').value.trim(), document.getElementById('li-pass').value); }
    catch(err){ loginBusy=false; loginErr=loginErrMsg(err.code); render(); }
  });
}
function wireApp(){ document.getElementById('btn-logout')?.addEventListener('click',()=>signOut(auth)); }

function loginErrMsg(code){
  const m={'auth/invalid-email':'Neplatný e-mail.','auth/user-not-found':'Účet neexistuje.',
    'auth/wrong-password':'Nesprávné heslo.','auth/invalid-credential':'Nesprávný e-mail nebo heslo.',
    'auth/too-many-requests':'Příliš mnoho pokusů, zkuste to za chvíli.',
    'auth/operation-not-allowed':'Přihlašování e-mailem není ve Firebase zapnuté.'};
  return m[code]||('Přihlášení se nezdařilo ('+code+').');
}
</script>
</body>
</html>
